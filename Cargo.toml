[package]
name = "openproton-bridge"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "cookies"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
anyhow = "1"

# SRP + crypto
num-bigint = { version = "0.4", features = ["rand"] }
num-traits = "0.2"
num-integer = "0.1"
sha2 = "0.10"
bcrypt = "0.16"
base64 = "0.22"
rand = "0.8"

# Async trait
async-trait = "0.1"

# Config + filesystem
dirs = "5"

# Password input
rpassword = "7"

[dev-dependencies]
wiremock = "0.6"
tempfile = "3"
assert_matches = "1"
tokio-test = "0.4"
