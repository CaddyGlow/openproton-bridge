[package]
name = "gluon-rs-mail"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
gluon-rs-core = { path = "../gluon-rs-core" }
rusqlite = { version = "0.31", features = ["bundled"] }
thiserror = "2"
tokio = { version = "1", features = ["io-util"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
